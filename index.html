<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaCom - Синхронизация (MockAPI)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔄 SeaCom Синхронизация</h1>
            <p>Реальное время - все изменения видны на всех устройствах</p>
            <div class="status-badge">
                <span class="status-dot"></span>
                <span id="statusText">Подключение...</span>
            </div>
        </header>

        <div class="device-card">
            <span id="deviceIcon">🖥️</span>
            <span id="deviceName">Определение...</span>
        </div>

        <div class="content-card">
            <h2>📊 Добавить товар</h2>
            <div class="form-row">
                <input type="text" id="productName" placeholder="Название товара">
                <input type="number" id="price" placeholder="Цена (₽)">
                <input type="number" id="sales" placeholder="Продажи (шт)">
                <select id="category">
                    <option value="Платья">Платья</option>
                    <option value="Футболки">Футболки</option>
                    <option value="Куртки">Куртки</option>
                    <option value="Джинсы">Джинсы</option>
                    <option value="Свитера">Свитера</option>
                </select>
                <button id="addBtn" class="btn primary">➕ Добавить</button>
            </div>
        </div>

        <div class="content-card">
            <div class="table-header">
                <h2>📋 Список товаров</h2>
                <button id="refreshBtn" class="btn small">🔄 Обновить</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Товар</th><th>Цена</th><th>Продажи</th><th>Категория</th><th></th></tr>
                    </thead>
                    <tbody id="tableBody"><tr><td colspan="5" class="empty">Загрузка...</td></tr></tbody>
                </table>
            </div>
            <div class="stats">
                <div>📦 Всего: <strong id="totalCount">0</strong></div>
                <div>💰 Средняя цена: <strong id="avgPrice">0</strong> ₽</div>
                <div>📈 Всего продаж: <strong id="totalSales">0</strong></div>
            </div>
        </div>

        <div class="buttons">
            <button id="sampleBtn" class="btn secondary">📋 Пример данных</button>
            <button id="clearBtn" class="btn danger">🗑️ Очистить все</button>
        </div>

        <div class="log-card">
            <h3>📡 Лог синхронизации</h3>
            <div id="log"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
